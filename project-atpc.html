<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农业贸易促进中心宣传册 - 项目详情</title>
     <meta name="robots" content="noindex, nofollow">
    <style>
        /* 复用你之前的详情页样式 */
        body { font-family: "PingFang SC", sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .nav-back { padding: 30px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-back a { text-decoration: none; color: #666; font-size: 14px; }
        .project-container { max-width: 1000px; margin: 0 auto; padding: 0 5% 100px; }
        .hero-info { margin-top: 40px; margin-bottom: 60px; }
        .tag { display: inline-block; background: #f0f0f0; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: #666; margin-bottom: 15px; }
        h1 { font-size: 32px; margin-bottom: 20px; color: #000; }
        .description { font-size: 17px; color: #555; max-width: 800px; margin-bottom: 50px; white-space: pre-wrap; }
        .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; border-top: 1px solid #eee; padding-top: 30px; }
        .meta-item label { display: block; font-size: 12px; color: #999; margin-bottom: 5px; text-transform: uppercase; }
        .meta-item span { font-size: 15px; font-weight: 500; }
        .detail-images { margin-top: 80px; }
        .detail-images img { width: 100%; margin-bottom: 40px; border-radius: 8px; display: block; }
        footer { padding: 80px 5%; background: #111; color: #fff; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<nav class="nav-back">
    <a href="works.html">← BACK TO WORKS</a>
    <span style="font-weight: 900; letter-spacing: 1px;">DESIGNER ALPHA</span>
</nav>

<div class="project-container" id="project-content">
    </div>

<footer><p>© 2024 DESIGNER ALPHA. ALL RIGHTS RESERVED.</p></footer>

<script src="projects.js"></script>
<script>
    // 关键点：这里指定查找 ID 为 atpc 的数据
    const projectData = ALL_PROJECTS.find(p => p.id === "atpc");

    if (projectData) {
        const container = document.getElementById('project-content');
        container.innerHTML = `
            <div class="hero-info">
                <span class="tag">${projectData.category}</span>
                <h1>${projectData.title}</h1>
                <div class="description">${projectData.description}</div>
                <div class="meta-grid">
                    <div class="meta-item"><label>DATE</label><span>${projectData.date}</span></div>
                    <div class="meta-item"><label>CLIENT</label><span>${projectData.client}</span></div>
                    <div class="meta-item"><label>SERVICES</label><span>${projectData.services}</span></div>
                    <div class="meta-item"><label>ROLE</label><span>${projectData.role}</span></div>
                </div>
            </div>
            <div class="detail-images">
                ${projectData.details.map(img => `<img src="${img}" alt="Detail Image">`).join('')}
            </div>
        `;
    } else {
        document.getElementById('project-content').innerHTML = "<p>项目加载失败，请检查路径。</p>";
    }
</script>

</body>
</html>
