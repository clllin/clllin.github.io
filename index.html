<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGNER ALPHA | Official Portfolio</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap">
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --secondary: #888888;
            --margin: 6vw;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); color: var(--text); 
            -webkit-font-smoothing: antialiased;
        }

        /* 导航栏 - 极简主义 */
        .nav-bar {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 40px var(--margin); z-index: 1000;
            background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
        }
        .logo { font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; text-decoration: none; color: #000; }
        .nav-links a { text-decoration: none; color: var(--secondary); margin-left: 30px; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: #000; }

        /* Hero 区域 - 压迫感大字报 */
        .hero {
            height: 75vh; display: flex; align-items: center;
            padding: 0 var(--margin); margin-top: 100px;
        }
        .hero h1 {
            font-size: clamp(48px, 10vw, 110px);
            font-weight: 800; line-height: 0.95; letter-spacing: -0.04em;
        }

        /* 项目网格 - 严谨对齐 */
        .work-grid {
            padding: 0 var(--margin) 10vh;
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 8vh 40px;
        }

        .project-card {
            text-decoration: none; color: inherit;
            display: block; cursor: pointer;
        }

        /* 图片包裹层 - 锁定 16:9 且带悬停动画 */
        .img-wrap {
            width: 100%; aspect-ratio: 16 / 9;
            overflow: hidden; background: #f4f4f4;
            margin-bottom: 25px; border-radius: 2px;
        }
        .img-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .project-card:hover img { transform: scale(1.06); }

        .project-info h3 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
        .project-info p { font-size: 1rem; color: var(--secondary); }

        /* 移动端适配 */
        @media (max-width: 900px) {
            :root { --margin: 5%; }
            .work-grid { grid-template-columns: 1fr; gap: 50px; }
            .hero { height: 50vh; }
            .hero h1 { font-size: 12vw; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" class="logo">DESIGNER ALPHA</a>
        <div class="nav-links">
            <a href="index.html">Work</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Creative Director & <br>Visual Designer.</h1>
    </header>

    <main class="work-grid">
        <a href="coffee.html" class="project-card">
            <div class="img-wrap">
                <img src="https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=1600&q=80" alt="Work 1">
            </div>
            <div class="project-info">
                <h3>New Force Coffee</h3>
                <p>Brand Identity & Direction</p>
            </div>
        </a>

        <a href="coffee.html" class="project-card">
            <div class="img-wrap">
                <img src="https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=1600&q=80" alt="Work 2">
            </div>
            <div class="project-info">
                <h3>Digital Core</h3>
                <p>UI/UX Experience Design</p>
            </div>
        </a>

        <a href="coffee.html" class="project-card">
            <div class="img-wrap">
                <img src="https://images.unsplash.com/photo-1454165833767-027ff770378a?auto=format&fit=crop&w=1600&q=80" alt="Work 3">
            </div>
            <div class="project-info">
                <h3>Editorial Series</h3>
                <p>Concept Photography</p>
            </div>
        </a>
    </main>

</body>
</html>
