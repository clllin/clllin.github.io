<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DESIGNER ALPHA | Portfolio</title>
    <style>
        /* --- 核心样式重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #ffffff; color: #111111; line-height: 1.6; overflow-x: hidden;
        }

        /* --- 导航栏 --- */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 30px 5%; position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px);
        }
        .logo { font-weight: 900; letter-spacing: 2px; text-decoration: none; color: #000; font-size: 20px; }
        .nav-links a { text-decoration: none; color: #666; margin-left: 30px; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover { color: #000; }

        /* --- Hero 欢迎区域 --- */
        .home-hero { 
            height: 60vh; display: flex; align-items: center; padding: 0 5%; 
            margin-top: 60px;
        }
        .hero-title { 
            font-size: clamp(40px, 8vw, 80px); font-weight: 700; line-height: 1.1; letter-spacing: -2px; 
        }

        /* --- 项目网格布局 (自适应核心) --- */
        .work-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* 电脑端双列 */
            gap: 60px 40px; 
            padding: 0 5% 100px; 
        }

        .project-card { 
            text-decoration: none; color: inherit; display: block;
            opacity: 0; transform: translateY(30px);
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }
        .project-card.active { opacity: 1; transform: translateY(0); }

        /* 强制 16:9 比例锁定 */
        .card-image { 
            width: 100%; aspect-ratio: 16 / 9; overflow: hidden; 
            background: #f7f7f7; margin-bottom: 20px; border-radius: 4px;
        }
        .card-image img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 1.2s ease; display: block;
        }
        .project-card:hover img { transform: scale(1.05); }

        .project-info h2 { font-size: 22px; font-weight: 600; margin-bottom: 5px; }
        .project-info p { font-size: 15px; color: #888; }

        /* --- 移动端自适应 --- */
        @media (max-width: 850px) {
            .work-grid { grid-template-columns: 1fr; gap: 40px; }
            .home-hero { height: 45vh; }
            .hero-title { font-size: 48px; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" class="logo">DESIGNER ALPHA</a>
        <div class="nav-links">
            <a href="index.html">Work</a>
            <a href="#">About</a>
        </div>
    </nav>

    <header class="home-hero">
        <h1 class="hero-title">Creative Director & <br>Visual Designer.</h1>
    </header>

    <main class="work-grid" id="work-grid">
        </main>

    <script>
        // 这里管理你的所有项目内容
        const homeConfig = {
            projects: [
                { 
                    title: "Brand Identity 2026", 
                    category: "Branding / Art Direction", 
                    thumb: "https://images.unsplash.com/photo-1494438639946-1ebd1d20bf85?auto=format&fit=crop&w=1600&q=80", 
                    url: "coffee.html" 
                },
                { 
                    title: "Digital Experience", 
                    category: "UIUX / Tech", 
                    thumb: "https://images.unsplash.com/photo-1558655146-d09347e92766?auto=format&fit=crop&w=1600&q=80", 
                    url: "coffee.html" 
                },
                { 
                    title: "Photography Series", 
                    category: "Concept / Photo", 
                    thumb: "https://images.unsplash.com/photo-1454165833767-027ff770378a?auto=format&fit=crop&w=1600&q=80", 
                    url: "coffee.html" 
                }
            ]
        };

        // 渲染逻辑
        const grid = document.getElementById('work-grid');
        
        homeConfig.projects.forEach((item, index) => {
            const card = document.createElement('a');
            card.href = item.url;
            card.className = 'project-card';
            card.innerHTML = `
                <div class="card-image">
                    <img src="${item.thumb}" alt="${item.title}">
                </div>
                <div class="project-info">
                    <h2>${item.title}</h2>
                    <p>${item.category}</p>
                </div>
            `;
            grid.appendChild(card);
            
            // 顺滑的入场动画
            setTimeout(() => {
                card.classList.add('active');
            }, 150 * index);
        });
    </script>
</body>
</html>
