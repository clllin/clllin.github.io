<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designer Portfolio</title>
    <style>
        :root { --bg: #ffffff; --text: #111; --accent: #666; --radius: 12px; --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Inter", sans-serif; background: var(--bg); color: var(--text); }
        .nav-bar { height: 80px; display: flex; justify-content: space-between; align-items: center; position: fixed; width: 100%; padding: 0 5%; z-index: 1000; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); }
        .full-banner { height: 80vh; position: relative; overflow: hidden; background: #000; }
        .full-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; }
        .banner-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #fff; }
        .main-content { max-width: 1200px; margin: 0 auto; padding: 80px 5%; }
        .section-label { font-size: 12px; letter-spacing: 2px; color: #999; margin-bottom: 40px; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .work-card { text-decoration: none; color: inherit; transition: var(--transition); }
        .img-16-9 { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius); overflow: hidden; background: #f0f0f0; margin-bottom: 15px; }
        .img-16-9 img { width: 100%; height: 100%; object-fit: cover; transition: var(--transition); }
        .work-card:hover { transform: translateY(-5px); }
        .work-card:hover img { transform: scale(1.05); }
        .view-all-btn { display: inline-block; margin-top: 50px; padding: 15px 40px; border: 1px solid #000; text-decoration: none; color: #000; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .view-all-btn:hover { background: #000; color: #fff; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <div style="font-weight:900; letter-spacing:2px;">DESIGNER PORTFOLIO</div>
        <div style="font-size:13px;"><a href="works.html" style="text-decoration:none; color:#000;">WORKS</a></div>
    </nav>

    <section class="full-banner">
        <img src="https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2000">
        <div class="banner-content"><h1>探索美学与逻辑的边界</h1></div>
    </section>

    <main class="main-content">
        <h2 class="section-label">Latest Projects</h2>
        <div class="work-grid" id="home-grid">
            </div>
        <div style="text-align: center;"><a href="works.html" class="view-all-btn">VIEW ALL WORKS</a></div>
    </main>

    <script src="projects.js"></script>
    <script>
        const grid = document.getElementById('home-grid');
        // 取前 3 个展示在首页
        grid.innerHTML = ALL_PROJECTS.slice(0, 3).map(p => `
            <a href="${p.url}" class="work-card">
                <div class="img-16-9"><img src="${p.cover}"></div>
                <h4>${p.title}</h4>
                <p style="font-size:12px; color:#999; margin-top:5px;">${p.date} / ${p.category}</p>
            </a>
        `).join('');
    </script>
</body>
</html>
