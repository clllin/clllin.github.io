<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - DESIGNER ALPHA</title>
    
    <style>
        /* --- 基础与重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "Helvetica Neue", Arial, "PingFang SC", sans-serif; 
            background-color: #fff; color: #111; line-height: 1.8; overflow-x: hidden;
        }

        /* --- 导航栏 --- */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 5%; position: fixed; top: 0; width: 100%; transition: 0.4s; z-index: 1000;
        }
        .nav-bar.scrolled {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            padding: 15px 5%; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 900; letter-spacing: 2px; text-decoration: none; color: #000; text-transform: uppercase; }
        .back-btn { font-size: 11px; text-decoration: none; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* --- 头部文字区域 --- */
        .hero-section { 
            padding: 160px 5% 60px; max-width: 1400px; margin: 0 auto; 
            opacity: 0; transform: translateY(20px); transition: 1s ease forwards;
        }
        .hero-section.visible { opacity: 1; transform: translateY(0); }
        .project-tag { font-size: 10px; color: #bbb; letter-spacing: 4px; margin-bottom: 15px; display: block; }
        .project-title { font-size: clamp(32px, 5vw, 64px); font-weight: 700; line-height: 1.1; margin-bottom: 50px; }

        .meta-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 30px; 
            border-top: 1px solid #eee; padding-top: 30px; 
        }
        .meta-item label { font-size: 9px; color: #aaa; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .meta-item span { font-size: 13px; font-weight: 500; }

        .main-content { padding: 0 5%; max-width: 1400px; margin: 0 auto; }

        /* --- 核心自适应逻辑 (强制 16:9) --- */
        .banner-wrapper, .reveal-box { 
            width: 100%; 
            aspect-ratio: 16 / 9; 
            background: #f7f7f7; 
            margin-bottom: 40px; 
            overflow: hidden; 
        }

        .banner-wrapper { margin-bottom: 80px; } 

        .banner-wrapper img, .reveal-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            display: block;
            transition: transform 1.2s ease;
        }

        /* 滚动入场动效 */
        .reveal-box { 
            opacity: 0; transform: translateY(30px); 
            transition: 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; 
        }
        .reveal-box.active { opacity: 1; transform: translateY(0); }
        .reveal-box:hover img { transform: scale(1.03); }

        /* --- 文字介绍块 --- */
        .narrative-block { 
            max-width: 800px; margin: 0 auto 100px auto; 
            opacity: 0; transform: translateY(20px); transition: 0.8s ease forwards;
        }
        .narrative-block.active { opacity: 1; transform: translateY(0); }
        .narrative-block h3 { font-size: 22px; margin-bottom: 20px; font-weight: 600; }
        .narrative-block p { color: #666; font-size: 16px; text-align: justify; }

        /* --- 底部引导 --- */
        .project-footer { border-top: 1px solid #eee; padding: 100px 5%; text-align: center; text-decoration: none; display: block; transition: 0.4s; color: inherit; }
        .project-footer:hover { background: #000; color: #fff; }
        .next-hint { font-size: 11px; color: #aaa; letter-spacing: 3px; }
        .next-name { font-size: 28px; margin-top: 10px; font-weight: 600; transition: 0.3s; }

        /* 移动端调整 */
        @media (max-width: 768px) {
            .meta-grid { grid-template-columns: 1fr 1fr; }
            .hero-section { padding-top: 120px; }
        }
    </style>
</head>
<body>

    <nav class="nav-bar" id="navbar">
        <a href="index.html" class="logo">DESIGNER ALPHA</a>
        <a href="index.html" class="back-btn">Back to List</a>
    </nav>

    <header class="hero-section" id="hero">
        <span class="project-tag" id="project-type">Category</span>
        <h1 class="project-title" id="project-main-title">Project Title</h1>
        
        <div class="meta-grid">
            <div class="meta-item"><label>Client</label><span id="meta-client">-</span></div>
            <div class="meta-item"><label>Date</label><span id="meta-date">-</span></div>
            <div class="meta-item"><label>Services</label><span id="meta-services">-</span></div>
            <div class="meta-item"><label>Role</label><span id="meta-role">-</span></div>
        </div>
    </header>

    <main class="main-content">
        <section class="banner-wrapper" id="project-banner"></section>

        <article class="narrative-block" id="project-desc">
            <h3 id="desc-title">设计叙事</h3>
            <p id="desc-content">正在载入描述...</p>
        </article>

        <section class="gallery-grid" id="project-gallery"></section>
    </main>

    <a href="#" class="project-footer" id="next-link">
        <span class="next-hint">NEXT CASE</span>
        <div class="next-name">Next Project →</div>
    </a>

    <script>
        /**
         * [配置区] 只需要修改这里的数据
         */
        const projectConfig = {
            title: "新势力咖啡品牌重构<br>New Force Coffee",
            category: "Branding / Visual Identity",
            client: "New Force Coffee",
            date: "2026",
            services: "Identity, Strategy, Packaging",
            role: "Lead Designer",
            
            introTitle: "设计洞察 / Insight",
            introText: "在快节奏的城市生活中，我们为品牌提取了“流动与撞击”的核心视觉概念。通过几何图形的解构，传达品牌探索未知、拒绝平庸的态度。色彩上采用了极具未来感的对比，使品牌在社交媒体中极具辨识度。",

            bannerImage: 'https://picsum.photos/seed/main/1600/900',

            galleryImages: [
                'https://picsum.photos/seed/1/1600/900',
                'https://picsum.photos/seed/2/1600/900',
                'https://picsum.photos/seed/3/1600/900',
                'https://picsum.photos/seed/4/1600/900',
                'https://picsum.photos/seed/5/1600/900'
            ],

            nextProjectName: "科技实验室视觉建设",
            nextProjectUrl: "detail-tech.html"
        };

        /**
         * [渲染引擎]
         */
        document.addEventListener('DOMContentLoaded', () => {
            // 填充文本
            document.getElementById('project-main-title').innerHTML = projectConfig.title;
            document.getElementById('project-type').innerText = projectConfig.category;
            document.getElementById('meta-client').innerText = projectConfig.client;
            document.getElementById('meta-date').innerText = projectConfig.date;
            document.getElementById('meta-services').innerText = projectConfig.services;
            document.getElementById('meta-role').innerText = projectConfig.role;
            document.getElementById('desc-title').innerText = projectConfig.introTitle;
            document.getElementById('desc-content').innerText = projectConfig.introText;
            document.querySelector('.next-name').innerText = projectConfig.nextProjectName + " →";
            document.getElementById('next-link').href = projectConfig.nextProjectUrl;

            // 渲染 Banner
            document.getElementById('project-banner').innerHTML = `<img src="${projectConfig.bannerImage}" alt="Banner">`;

            // 渲染图片流
            const galleryContainer = document.getElementById('project-gallery');
            projectConfig.galleryImages.forEach(src => {
                const box = document.createElement('div');
                box.className = 'reveal-box';
                box.innerHTML = `<img src="${src}" alt="Gallery Image">`;
                galleryContainer.appendChild(box);
            });

            // 动画触发
            setTimeout(() => document.getElementById('hero').classList.add('visible'), 150);
            window.addEventListener('scroll', () => {
                document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
            });

            // 滚动观察
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });

            setTimeout(() => {
                document.querySelectorAll('.reveal-box, .narrative-block').forEach(el => observer.observe(el));
            }, 300);
        });
    </script>
</body>
</html>
