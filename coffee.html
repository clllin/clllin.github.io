<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Detail</title>
    <style>
        :root { --bg: #ffffff; --text: #111; }
        body { font-family: "Inter", sans-serif; line-height: 1.6; }
        .nav { height: 60px; display: flex; align-items: center; padding: 0 5%; position: fixed; width: 100%; background: rgba(255,255,255,0.9); z-index: 100; }
        .detail-banner { width: 100%; height: 70vh; overflow: hidden; background: #eee; }
        .detail-banner img { width: 100%; height: 100%; object-fit: cover; }
        .content-wrap { max-width: 1000px; margin: 0 auto; padding: 60px 5%; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; margin: 40px 0; border-top: 1px solid #eee; padding-top: 30px; }
        .info-item label { display: block; font-size: 11px; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        .info-item span { font-weight: 500; font-size: 14px; }
        .gallery-list img { width: 100%; margin-bottom: 20px; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="nav"><a href="index.html" style="text-decoration:none; color:#000;">← BACK</a></nav>
    
    <div class="detail-banner"><img id="p-banner" src=""></div>
    
    <div class="content-wrap">
        <h1 id="p-title" style="font-size: clamp(24px, 5vw, 40px); font-weight: 300;"></h1>
        
        <div class="info-grid" id="p-info">
            </div>

        <div style="margin: 60px 0;">
            <h3 style="font-size:12px; color:#999; margin-bottom:15px;">DESIGN INSIGHT</h3>
            <p id="p-desc" style="color:#555; font-size:15px;"></p>
        </div>

        <div class="gallery-list" id="p-gallery">
            </div>
    </div>

    <script src="projects.js"></script>
    <script>
        // 【关键逻辑】根据当前页面的特定 ID 获取数据（这里可以手动设置，或者根据 URL 判断）
        // 既然目前你只有一个详情页，我们先手动让它关联 camping 项目
        const data = ALL_PROJECTS.find(p => p.id === "camping");

        if(data) {
            document.getElementById('p-banner').src = data.cover;
            document.getElementById('p-title').innerText = data.title;
            document.getElementById('p-desc').innerText = data.description;
            
            document.getElementById('p-info').innerHTML = `
                <div class="info-item"><label>Client</label><span>${data.client}</span></div>
                <div class="info-item"><label>Date</label><span>${data.date}</span></div>
                <div class="info-item"><label>Services</label><span>${data.services}</span></div>
                <div class="info-item"><label>Role</label><span>${data.role}</span></div>
            `;
            
            document.getElementById('p-gallery').innerHTML = data.details.map(img => `<img src="${img}">`).join('');
        }
    </script>
</body>
</html>
