<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农业品牌计划公众号 - DESIGNER ALPHA</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        /* 基础全局样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            background-color: #fff; color: #111; line-height: 1.6; overflow-x: hidden; 
        }

        /* 顶部导航栏 */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; color: #000; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 14px; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: #000; }

        /* 返回按钮 */
        .back-container { padding: 40px 5% 0; max-width: 1200px; margin: 0 auto; }
        .back-btn { 
            display: inline-flex; align-items: center; text-decoration: none; 
            color: #666; font-size: 14px; transition: 0.3s; 
        }
        .back-btn:hover { color: #000; transform: translateX(-4px); }
        .back-btn span { margin-right: 8px; font-size: 18px; }

        /* 项目信息区大结构 */
        .project-container { padding: 40px 5% 80px; max-width: 1200px; margin: 0 auto; }
        .project-title { font-size: 32px; font-weight: 600; margin-bottom: 40px; color: #000; letter-spacing: 0.5px; }
        
        /* 详情信息网格 */
        .meta-grid { 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            gap: 30px; border-top: 1px solid #eee; border-bottom: 1px solid #eee; 
            padding: 30px 0; margin-bottom: 50px;
        }
        .meta-item h5 { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .meta-item p { font-size: 15px; color: #333; font-weight: 500; }

        /* 项目描述（按要求不填写任何说明文本，隐藏或留空） */
        .project-desc { font-size: 16px; color: #444; line-height: 1.8; margin-bottom: 60px; max-width: 800px; }

        /* 图片瀑布流展示 */
        .image-gallery { display: flex; flex-direction: column; gap: 30px; }
        .gallery-item { width: 100%; overflow: hidden; border-radius: 8px; background-color: #fcfcfc; }
        .gallery-item img { width: 100%; height: auto; display: block; object-fit: cover; }

        /* 底部版权 */
        .footer-dark { background-color: #111; color: #fff; padding: 100px 5% 50px; text-align: center; margin-top: 100px; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .project-title { font-size: 24px; margin-bottom: 30px; }
            .meta-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .project-container { padding: 20px 5% 60px; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="logo">DESIGNER ALPHA</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="works.html" class="active">项目展示</a></li>
        <li><a href="#contact">联系方式</a></li>
    </ul>
</nav>

<div class="back-container">
    <a href="works.html" class="back-btn"><span>←</span> 返回作品列表</a>
</div>

<div class="project-container">
    <!-- 项目标题 -->
    <h1 class="project-title">农业品牌计划公众号</h1>

    <!-- 顶栏属性项：服务、客户留空；设计角色：主设计；年份：2024 -->
    <div class="meta-grid">
        <div class="meta-item">
            <h5>Client / 客户</h5>
            <p>—</p>
        </div>
        <div class="meta-item">
            <h5>Services / 服务</h5>
            <p>—</p>
        </div>
        <div class="meta-item">
            <h5>Role / 角色</h5>
            <p>主设计</p>
        </div>
        <div class="meta-item">
            <h5>Date / 时间</h5>
            <p>2024</p>
        </div>
    </div>

    <!-- 项目介绍（应要求留空说明） -->
    <div class="project-desc"></div>

    <!-- 详情大图完美平铺展示 -->
    <div class="image-gallery">
        <div class="gallery-item">
            <img src="images/nonage/农业公众号1.jpg" alt="农业品牌计划公众号 页面展示 1">
        </div>
        <div class="gallery-item">
            <img src="images/nonage/农业公众号2.jpg" alt="农业品牌计划公众号 页面展示 2">
        </div>
    </div>
</div>

<footer class="footer-dark">
    <p>© 2026 DESIGNER ALPHA. ALL RIGHTS RESERVED.</p>
</footer>

</body>
</html>
