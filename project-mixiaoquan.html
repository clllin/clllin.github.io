<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目详情 - DESIGNER ALPHA</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        /* 基础样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "PingFang SC", sans-serif; background: #fff; color: #111; line-height: 1.6; }
        
        /* 导航栏 */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; color: #000; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 14px; }

        /* 详情页排版 */
        .detail-container { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .back-btn { display: inline-block; margin-bottom: 40px; color: #666; text-decoration: none; font-size: 14px; }
        .back-btn:hover { color: #000; }
        
        .project-header { margin-bottom: 50px; border-bottom: 1px solid #eee; padding-bottom: 40px; }
        .project-title { font-size: 36px; font-weight: 600; margin-bottom: 20px; }
        
        /* 信息网格 */
        .meta-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .meta-item h5 { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 5px; }
        .meta-item p { font-size: 15px; color: #333; font-weight: 500; }
        
        .project-desc { font-size: 16px; color: #555; max-width: 800px; margin-top: 30px; text-align: justify; }
        
        /* 图片大图流列表 */
        .image-list { display: flex; flex-direction: column; gap: 30px; margin-top: 60px; }
        .image-list img { width: 100%; height: auto; display: block; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }

        .footer-dark { background-color: #111; color: #fff; padding: 60px 5% 40px; margin-top: 100px; text-align: center; }

        @media (max-width: 768px) {
            .meta-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; }
            .project-title { font-size: 28px; }
        }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="logo">DESIGNER ALPHA</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="works.html">项目展示</a></li>
    </ul>
</nav>

<div class="detail-container">
    <a href="javascript:history.back();" class="back-btn">← 返回上一页</a>
    
    <div class="project-header">
        <h1 class="project-title" id="p-title">Loading...</h1>
        
        <div class="meta-grid">
            <div class="meta-item"><h5>项目时间</h5><p id="p-date">-</p></div>
            <div class="meta-item"><h5>服务客户</h5><p id="p-client">-</p></div>
            <div class="meta-item"><h5>服务内容</h5><p id="p-services">-</p></div>
            <div class="meta-item"><h5>设计角色</h5><p id="p-role">-</p></div>
        </div>
        
        <p class="project-desc" id="p-desc">-</p>
    </div>

    <div class="image-list" id="p-images"></div>
</div>

<footer class="footer-dark">
    <p>© 2026 DESIGNER ALPHA. ALL RIGHTS RESERVED.</p>
</footer>

<script src="projects.js"></script>
<script>
    // 自动通过当前文件名或固定 ID 匹配数据库中的“mixiaoquan”
    const currentId = "mixiaoquan"; 
    const project = ALL_PROJECTS.find(p => p.id === currentId);

    if (project) {
        // 渲染基础文本数据
        document.title = project.title + " - DESIGNER ALPHA";
        document.getElementById('p-title').innerText = project.title;
        document.getElementById('p-date').innerText = project.date;
        document.getElementById('p-client').innerText = project.client;
        document.getElementById('p-services').innerText = project.services;
        document.getElementById('p-role').innerText = project.role;
        document.getElementById('p-desc').innerText = project.description;

        // 渲染详情长图流
        const imageContainer = document.getElementById('p-images');
        project.details.forEach(imgUrl => {
            const img = document.createElement('img');
            img.src = imgUrl;
            img.alt = project.title;
            // 增加图片加载失败的容错提示
            img.onerror = function() { this.style.display = 'none'; }; 
            imageContainer.appendChild(img);
        });
    } else {
        document.getElementById('p-title').innerText = "项目未找到";
    }
</script>

</body>
</html>
