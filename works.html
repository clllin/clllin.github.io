<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目展示 - DESIGNER ALPHA</title>
    <style>
        /* --- 1. 全局样式 (保持干净) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            background-color: #fff; color: #333; line-height: 1.6; overflow-x: hidden; 
        }

        /* --- 2. 导航栏 --- */
        .nav-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 5%; position: sticky; top: 0; 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); 
            z-index: 1000; border-bottom: 1px solid #eee;
        }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; color: #000; text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 30px; }
        .nav-links a { text-decoration: none; color: #666; font-size: 14px; }
        .nav-links a.active { color: #000; font-weight: bold; }

        /* --- 3. 核心：整齐划一的布局 --- */
        .main-content { padding: 60px 5%; max-width: 1600px; margin: 0 auto; }
        .category-block { margin-bottom: 80px; }
        
        .category-header { 
            display: flex; align-items: flex-end; 
            margin-bottom: 25px; border-left: 4px solid #000; padding-left: 20px;
        }
        .cat-title { font-size: 24px; font-weight: 600; color: #000; }
        .cat-desc { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 1px; margin-left: 15px; margin-bottom: 4px; }

        /* --- 4. 统一的横向滚动 (解决大大小小不一的问题) --- */
        .scroll-wrapper { position: relative; display: flex; align-items: center; }
        .work-grid { 
            display: flex; gap: 25px; overflow-x: auto; scroll-behavior: smooth; 
            padding: 10px 0 20px 0; scrollbar-width: none; 
        }
        .work-grid::-webkit-scrollbar { display: none; }
        
        /* 强制所有卡片宽度一致 */
        .work-card { 
            flex: 0 0 450px; /* 关键：固定每个卡片的宽度，不被压缩 */
            text-decoration: none; color: inherit; transition: 0.4s; 
        }
        .img-16-9 { 
            width: 100%; aspect-ratio: 16/9; background: #f0f0f0; 
            overflow: hidden; border-radius: 4px; margin-bottom: 12px; 
        }
        .img-16-9 img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .work-card:hover { transform: translateY(-5px); }
        .work-card:hover img { transform: scale(1.05); }
        .work-card h4 { font-size: 16px; font-weight: 500; }

        /* --- 5. 滚动按钮 --- */
        .scroll-btn { 
            position: absolute; width: 44px; height: 44px; border-radius: 50%; border: none;
            background: #000; color: white; cursor: pointer; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            top: 40%; transform: translateY(-50%); opacity: 0.8; transition: 0.3s;
        }
        .scroll-btn:hover { opacity: 1; transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: -22px; }
        .btn-next { right: -22px; }

        /* --- 6. 页脚 --- */
        .footer-dark { background-color: #111; color: #fff; padding: 80px 5%; margin-top: 50px; text-align: center; }

        @media (max-width: 768px) { .work-card { flex: 0 0 300px; } .scroll-btn { display: none; } }
    </style>
</head>
<body>

<nav class="nav-bar">
    <a href="index.html" class="logo">DESIGNER ALPHA</a>
    <ul class="nav-links">
        <li><a href="index.html">首页</a></li>
        <li><a href="works.html" class="active">项目展示</a></li>
    </ul>
</nav>

<div class="main-content">
    
    <section class="category-block">
        <div class="category-header">
            <h2 class="cat-title">品牌全案</h2><p class="cat-desc">Brand Strategy & Identity</p>
        </div>
        <div class="scroll-wrapper">
            <button class="scroll-btn btn-prev" onclick="scrollGrid('grid-1', -1)">←</button>
            <div class="work-grid" id="grid-1">
                <a href="coffee.html" class="work-card">
                    <div class="img-16-9"><img src="active-cover.jpg"></div>
                    <h4>内蒙古露营小镇项目策划</h4>
                </a>
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/1/800/450"></div><h4>科技实验室视觉建设</h4></a>
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/2/800/450"></div><h4>买手店品牌孵化</h4></a>
            </div>
            <button class="scroll-btn btn-next" onclick="scrollGrid('grid-1', 1)">→</button>
        </div>
    </section>

    <section class="category-block">
        <div class="category-header">
            <h2 class="cat-title">品牌 VIS</h2><p class="cat-desc">Visual Identity Systems</p>
        </div>
        <div class="scroll-wrapper">
            <button class="scroll-btn btn-prev" onclick="scrollGrid('grid-2', -1)">←</button>
            <div class="work-grid" id="grid-2">
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/3/800/450"></div><h4>新能源汽车标识设计</h4></a>
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/4/800/450"></div><h4>定制字体设计案例</h4></a>
            </div>
            <button class="scroll-btn btn-next" onclick="scrollGrid('grid-2', 1)">→</button>
        </div>
    </section>

    <section class="category-block">
        <div class="category-header">
            <h2 class="cat-title">印刷物料</h2><p class="cat-desc">Print Design</p>
        </div>
        <div class="scroll-wrapper">
            <button class="scroll-btn btn-prev" onclick="scrollGrid('grid-3', -1)">←</button>
            <div class="work-grid" id="grid-3">
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/5/800/450"></div><h4>年度艺术季展览画册</h4></a>
                <a href="#" class="work-card"><div class="img-16-9"><img src="https://picsum.photos/seed/6/800/450"></div><h4>书籍排版研究</h4></a>
            </div>
            <button class="scroll-btn btn-next" onclick="scrollGrid('grid-3', 1)">→</button>
        </div>
    </section>

    </div>

<footer class="footer-dark">
    <h2>期待与您共同创造</h2>
</footer>

<script>
    function scrollGrid(gridId, direction) {
        const grid = document.getElementById(gridId);
        grid.scrollBy({ left: direction * 475, behavior: 'smooth' }); // 滚动距离 = 卡片宽 + 间距
    }
</script>

</body>
</html>
